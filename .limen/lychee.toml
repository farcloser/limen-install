# DO NOT EDIT MANUALLY.
# Canonical lychee (link checker) configuration, identical in every repository.
# A repository can add its own exclusions in a root .lychee.toml — the `lint links`
# recipe passes both files and lychee merges them, concatenating the exclude
# lists — so this baseline only carries exclusions that apply everywhere.

# Transient failures (5xx, 408, 429) are retried by lychee, but its defaults
# (3 retries, 2s minimum wait) span mere seconds — shorter than a typical
# GitHub 503 blip, so runs failed on weather. Widen the window instead of
# accepting the codes outright: a server that is STILL erroring after ~a
# minute of backoff is a finding, not weather.
max_retries = 6
retry_wait_time = 5

exclude = [
  # fsf.org: verbatim (A)GPL license texts link to it, and its server (TLS 1.2
  # with DHE-only key exchange) cannot complete a handshake with lychee's
  # rustls, which implements neither. The links themselves are fine.
  # gnu.org: rate-limits aggressively, so the license-text links to it fail
  # intermittently.
  'https?://(www\.)?(fsf|gnu)\.org(/|$)',
]
