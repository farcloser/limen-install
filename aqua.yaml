# aqua — Declarative CLI Version Manager — https://aquaproj.github.io/
checksum:
  enabled: true
  require_checksum: true
  supported_envs:
    - darwin/amd64
    - darwin/arm64
    - linux/amd64
    - linux/arm64

registries:
  - type: standard
    ref: v4.530.0 # renovate: depName=aquaproj/aqua-registry
  - name: local
    type: local
    path: .just/aqua-registry.yaml

packages:
  # --- go install tools (local registry, GOSUMDB-verified) ---
  - name: github.com/google/go-licenses@v2.0.1
    registry: local
  # --- toolchain + binary-release tools (standard registry, aqua-verified) ---
  - name: golang/go@go1.26.4
  - name: casey/just@1.55.1
  - name: koalaman/shellcheck@v0.11.0
  - name: golangci/golangci-lint@v2.12.2
  - name: google/yamlfmt@v0.21.0
  - name: lycheeverse/lychee@lychee-v0.24.2
